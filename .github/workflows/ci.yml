name: build

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.19, 20.x, 22.x, 24.x, 26.x]
        eslint-version: [^9, ^10]

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: "https://registry.npmjs.org"

      - name: ⏬ Install
        run: |
          npm ci

      - name: ⏬ Install eslint@${{ matrix.eslint-version }}
        run: |
          npm i -D eslint@${{ matrix.eslint-version }}

      - name: ✨ Lint
        run: |
          npm run lint

      - name: ✨ Typecheck
        if: ${{ matrix.eslint-version == '^10'  }}
        run: |
          npm run typecheck

      - name: 🧪 Test
        run: |
          npm test

      - name: npm publish
        uses: k-yle/npm-publish@v1
        if: ${{ matrix.node-version == '26.x' && matrix.eslint-version == '^10' }}
